version: "3.9"

services:
  slack-adapter:
    build: ./slack_adapter
    ports:
      - "8000:8000"
    env_file:
      - ./slack_adapter/.env
    environment:
      AI_SERVICE_URL: http://ai-service:8001
    depends_on:
      - ai-service
    restart: unless-stopped

  ai-service:
    build: ./ai_service
    ports:
      - "8001:8001"
    env_file:
      - ./ai_service/.env
    restart: unless-stopped